<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - آسر كريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #16a34a;
            --bg: #f8fafc;
        }

        body {
            background-color: var(--bg);
            padding-bottom: 40px;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .dash-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        label {
            font-weight: 700;
            font-size: 0.9rem;
            color: #444;
        }

        input,
        select,
        textarea {
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #15803d;
            transform: translateY(-2px);
        }

        .preview-area {
            margin-top: 40px;
        }

        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 10px;
        }

        .back-home {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #image-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <div class="dash-header">
            <h1 style="margin:0; font-size: 1.5rem;">إضافة منتج جديد</h1>
            <a href="index.html" class="back-home">← العودة للموقع</a>
        </div>

        <div class="dash-card">
            <h2 style="margin-bottom: 10px;">إدارة الكلمات الافتتاحية (Tags)</h2>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">الكلمات التي تظهر تحت محرك البحث في الصفحة
                الرئيسية لتسهيل الوصول.</p>
            <form id="tag-form" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="tag-label" placeholder="مثلاً: بانيوهات" required style="flex: 1;">
                <button type="submit" class="btn-submit" style="margin: 0; padding: 10px 20px;">+ إضافة</button>
            </form>
            <div id="tags-list" style="display: flex; flex-wrap: wrap; gap: 10px;">
                <!-- Tags will appear here -->
            </div>
        </div>

        <div class="dash-card">
            <h2 style="margin-bottom: 20px;">إضافة منتج جديد</h2>
            <form id="product-form">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>اسم المنتج</label>
                        <input type="text" id="p-name" placeholder="مثلاً: طقم ديوراستايل ديورافيت" required>
                    </div>

                    <div class="form-group">
                        <label>القسم</label>
                        <select id="p-category" required>
                            <option value="سيراميك">سيراميك</option>
                            <option value="بورسلين">بورسلين</option>
                            <option value="أدوات صحية">أدوات صحية</option>
                            <option value="خلاطات">خلاطات</option>
                            <option value="وحدات حمام">وحدات حمام</option>
                            <option value="أحواض مطبخ">أحواض مطبخ</option>
                            <option value="بانيوهات">بانيوهات</option>
                            <option value="أبواب مصفحة">أبواب مصفحة</option>
                            <option value="باركيه">باركيه</option>
                            <option value="إكسسوارات">إكسسوارات</option>
                            <option value="ديكورات المنزل">ديكورات المنزل</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>العلامة التجارية (الماركة)</label>
                        <input type="text" id="p-brand" placeholder="مثلاً: ديورافيت">
                    </div>

                    <div class="form-group">
                        <label>الفرز (أول، ثاني، ..)</label>
                        <input type="text" id="p-grade" placeholder="فمثلاً: فرز أول">
                    </div>

                    <div class="form-group">
                        <label>المقاس</label>
                        <input type="text" id="p-size" placeholder="مثلاً: 60*60">
                    </div>

                    <div class="form-group">
                        <label>السعر الحالي (جنيه)</label>
                        <input type="number" id="p-price" placeholder="13591" required>
                    </div>

                    <div class="form-group">
                        <label>السعر قبل الخصم (اختياري)</label>
                        <input type="number" id="p-old-price" placeholder="17650">
                    </div>

                    <div class="form-group">
                        <label>نسبة الخصم (مثلاً: 23-%)</label>
                        <input type="text" id="p-discount" placeholder="23%-">
                    </div>

                    <div class="form-group">
                        <label>الحالة</label>
                        <select id="p-status">
                            <option value="none">عادي</option>
                            <option value="limited">الكمية محدودة</option>
                            <option value="new">جديد</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>نوع المنتج (النوع/الماركة الفرعية)</label>
                        <input type="text" id="p-type" list="type-suggestions" placeholder="مثلاً: سيراميكا كليوباترا">
                        <datalist id="type-suggestions">
                            <!-- Ceramic -->
                            <option value="سيراميكا كليوباترا">
                            <option value="سيراميكا لي جلاس">
                            <option value="سيراميكا اليجانس">
                            <option value="سيراميكا رويال">
                            <option value="سيراميكا أرت">
                            <option value="سيراميكا ديماس">
                            <option value="سيراميكا فيردي">
                            <option value="سيراميكا سيسيل">
                                <!-- Porcelain -->
                            <option value="بورسلين صيني">
                            <option value="بورسلين هندي">
                            <option value="بورسلين إسباني">
                            <option value="بورسلين كليوباترا">
                                <!-- Sanitary -->
                            <option value="ايديال ستاندرد">
                            <option value="ديورافيت">
                            <option value="جروهي">
                            <option value="روكا">
                                <!-- Kitchen Sinks -->
                            <option value="حوض مطبخ تركي">
                            <option value="حوض مطبخ كوري">
                            <option value="حوض مطبخ صيني">
                            <option value="حوض مطبخ ماليزي">
                            <option value="حوض مطبخ سيفين سيسيل">
                            <option value="حوض مطبخ الأصيل">
                            <option value="حوض مطبخ بلاتزا">
                                <!-- Doors & Parquet -->
                            <option value="مستورد تركي">
                            <option value="مستورد صيني">
                            <option value="مصري">
                            <option value="HDF تركي">
                            <option value="HDF ألماني">
                            <option value="SPC">
                                <!-- Accessories -->
                            <option value="إكسسوارات حمام">
                            <option value="إكسسوارات مطبخ">
                            <option value="مرايات حمام">
                                <!-- Decor -->
                            <option value="بديل خشب">
                            <option value="بديل رخام">
                            <option value="بديل حجري">
                            <option value="نجيلة صناعي">
                            <option value="ورق حائط">
                                <!-- Others -->
                            <option value="متنوع">
                        </datalist>
                    </div>

                    <div class="form-group">
                        <label>تاج السعر أو فلتر إضافي</label>
                        <input type="text" id="p-price-tag" list="tag-suggestions" placeholder="مثلاً: أقل من 5000">
                        <datalist id="tag-suggestions">
                            <option value="أقل من 2000">
                            <option value="من 2000 إلى 5000">
                            <option value="أكثر من 5000">
                            <option value="عرض خاص">
                            <option value="وصل حديثاً">
                        </datalist>
                    </div>

                    <div class="form-group full">
                        <label>صور المنتج (يمكنك إضافة أكثر من صورة)</label>
                        <div id="image-inputs-container" style="display: flex; flex-direction: column; gap: 10px;">
                            <div class="image-input-row" style="display: flex; gap: 10px; align-items: start;">
                                <div style="flex: 1;">
                                    <input type="file" class="p-image-file" accept="image/*" style="width: 100%;">
                                    <input type="text" class="p-image-url" placeholder="أدخل رابط الصورة"
                                        style="width: 100%; margin-top: 5px;">
                                </div>
                                <button type="button" class="btn-remove-img"
                                    style="display:none; color:#ef4444; font-size:1.5rem; border:none; background:none;">&times;</button>
                            </div>
                        </div>
                        <button type="button" id="add-more-images"
                            style="background:#f1f5f9; border: 1.5px dashed #cbd5e1; padding: 10px; border-radius: 10px; margin-top: 10px; font-weight: 700; color: #64748b;">+
                            إضافة صورة أخرى</button>

                        <div id="image-previews-container"
                            style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px;"></div>

                        <div id="upload-status"
                            style="font-size: 0.85rem; color: var(--primary); margin-top: 5px; font-weight: 700; display: none;">
                            جاري رفع الصور... <span id="upload-progress">0/0</span></div>
                    </div>

                    <div id="edit-controls" style="display: none; grid-column: span 2; gap: 10px; margin-top: 10px;">
                        <button type="submit" id="update-btn" class="btn-submit" style="flex: 2; margin: 0;">تحديث
                            المنتج</button>
                        <button type="button" id="cancel-edit-btn" class="btn-cancel"
                            style="flex: 1; background: #94a3b8; color: white;">إلغاء التعديل</button>
                    </div>
                    <button type="submit" id="submit-btn" class="btn-submit full">إضافة المنتج للموقع</button>
                </div>
            </form>
        </div>

        <div class="preview-area">
            <h2 class="section-title">المنتجات المضافة حالياً</h2>
            <div class="product-list" id="dash-product-list">
                <!-- Products will appear here -->
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc } from './firebase-config.js';

        let editingProductId = null;

        // --- Tag Management ---
        const tagForm = document.getElementById('tag-form');
        const tagsList = document.getElementById('tags-list');
        const tagLabelInput = document.getElementById('tag-label');

        function loadTags() {
            onSnapshot(query(collection(db, "hero_tags")), (snapshot) => {
                tagsList.innerHTML = '';
                snapshot.forEach(doc => {
                    const tag = doc.data();
                    const id = doc.id;
                    const tagEl = document.createElement('div');
                    tagEl.style.cssText = 'background: #f1f5f9; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 8px;';
                    tagEl.innerHTML = `
                        <span>${tag.label}</span>
                        <button onclick="deleteTag('${id}')" style="color: #ef4444; border: none; background: none; font-size: 1.1rem; cursor: pointer;">&times;</button>
                    `;
                    tagsList.appendChild(tagEl);
                });
            });
        }

        tagForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const label = tagLabelInput.value.trim();
            if (!label) return;
            try {
                await addDoc(collection(db, "hero_tags"), { label, createdAt: new Date() });
                tagLabelInput.value = '';
            } catch (err) { alert('خطأ في الإضافة'); }
        });

        window.deleteTag = async (id) => {
            if (confirm('حذف الكلمة؟')) {
                await deleteDoc(doc(db, "hero_tags", id));
            }
        };

        // --- Product Management ---
        const form = document.getElementById('product-form');
        const productList = document.getElementById('dash-product-list');
        const uploadStatus = document.getElementById('upload-status');
        const submitBtn = document.getElementById('submit-btn');

        // Show image preview logic
        const imageInputsContainer = document.getElementById('image-inputs-container');
        const previewsContainer = document.getElementById('image-previews-container');
        const addMoreBtn = document.getElementById('add-more-images');

        function bindRowListeners(row) {
            row.querySelector('.p-image-url').addEventListener('input', updatePreviews);
            row.querySelector('.p-image-file').addEventListener('change', updatePreviews);
            const removeBtn = row.querySelector('.btn-remove-img');
            if (removeBtn) {
                removeBtn.onclick = () => {
                    row.remove();
                    updatePreviews();
                };
            }
        }

        addMoreBtn.addEventListener('click', () => {
            const row = document.createElement('div');
            row.className = 'image-input-row';
            row.style.cssText = 'display: flex; gap: 10px; align-items: start; margin-top: 10px;';
            row.innerHTML = `
                <div style="flex: 1;">
                    <input type="file" class="p-image-file" accept="image/*" style="width: 100%;">
                    <input type="text" class="p-image-url" placeholder="أدخل رابط الصورة" style="width: 100%; margin-top: 5px;">
                </div>
                <button type="button" class="btn-remove-img" style="color:#ef4444; font-size:1.5rem; border:none; background:none; cursor:pointer;">&times;</button>
            `;
            imageInputsContainer.appendChild(row);
            bindRowListeners(row);
        });

        function updatePreviews() {
            previewsContainer.innerHTML = '';
            document.querySelectorAll('.image-input-row').forEach(row => {
                const url = row.querySelector('.p-image-url').value;
                const file = row.querySelector('.p-image-file').files[0];

                const preview = document.createElement('div');
                preview.style.cssText = 'width: 80px; height: 80px; border-radius: 8px; border: 1px solid #ddd; overflow: hidden; background: #eee;';
                const img = document.createElement('img');
                img.style.cssText = 'width: 100%; height: 100%; object-fit: cover;';

                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        img.src = e.target.result;
                        preview.appendChild(img);
                        previewsContainer.appendChild(preview);
                    };
                    reader.readAsDataURL(file);
                } else if (url) {
                    img.src = url;
                    preview.appendChild(img);
                    previewsContainer.appendChild(preview);
                }
            });
        }

        // Apply initial listener
        bindRowListeners(document.querySelector('.image-input-row'));

        async function uploadImages() {
            const urls = [];
            const rows = document.querySelectorAll('.image-input-row');
            const fileRows = [...rows].filter(r => r.querySelector('.p-image-file').files[0]);

            if (fileRows.length > 0) {
                uploadStatus.style.display = 'block';
                document.getElementById('upload-progress').textContent = `0/${fileRows.length}`;
            }

            let uploadedCount = 0;
            for (const row of rows) {
                const file = row.querySelector('.p-image-file').files[0];
                const manualUrl = row.querySelector('.p-image-url').value;

                if (file) {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', "asr-kareem");

                    try {
                        const res = await fetch(`https://api.cloudinary.com/v1_1/dwrhl6gjf/image/upload`, {
                            method: 'POST',
                            body: formData
                        });
                        const data = await res.json();
                        urls.push(data.secure_url);
                        uploadedCount++;
                        document.getElementById('upload-progress').textContent = `${uploadedCount}/${fileRows.length}`;
                    } catch (e) { console.error("Upload failed", e); }
                } else if (manualUrl) {
                    urls.push(manualUrl);
                }
            }
            return urls;
        }

        // Load existing products with real-time listener
        function loadProducts() {
            const q = query(collection(db, "products"));
            onSnapshot(q, (querySnapshot) => {
                productList.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const p = doc.data();
                    const id = doc.id;
                    const mainImg = (p.images && p.images.length > 0) ? p.images[0] : (p.image || '');
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="product-img-wrap">
                            <img src="${mainImg}" alt="${p.name}">
                            ${p.discount ? `<span class="discount-badge">${p.discount}</span>` : ''}
                            ${p.status === 'limited' ? `<span class="limited-badge">الكمية محدودة</span>` : ''}
                            ${p.status === 'new' ? `<span class="new-badge dark-green">جديد</span>` : ''}
                        </div>
                        <div class="product-info">
                            <h3 class="product-name">${p.name}</h3>
                            <div style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">${p.images ? p.images.length : 1} صور</div>
                            <div class="product-price-row">
                                ${p.oldPrice ? `<span class="old-price">ج.م ${p.oldPrice}</span>` : ''}
                                <span class="cur-price">جنيه ${p.price}</span>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <button class="btn-submit" style="padding: 5px 12px; font-size: 0.8rem; margin:0;" 
                                    onclick="editProduct('${id}', '${encodeURIComponent(JSON.stringify(p)).replace(/'/g, "\\'")}')">تعديل</button>
                                <button class="delete-btn" style="margin:0;" onclick="deleteProduct('${id}')">حذف</button>
                            </div>
                        </div>
                    `;
                    productList.appendChild(card);
                });
            });
        }

        window.editProduct = (id, pJson) => {
            const p = JSON.parse(decodeURIComponent(pJson));
            editingProductId = id;

            // Fill form
            document.getElementById('p-name').value = p.name || '';
            document.getElementById('p-category').value = p.category || 'سيراميك';
            document.getElementById('p-brand').value = p.brand || '';
            document.getElementById('p-grade').value = p.grade || '';
            document.getElementById('p-size').value = p.size || '';
            document.getElementById('p-price').value = p.price || '';
            document.getElementById('p-old-price').value = p.oldPrice || '';
            document.getElementById('p-discount').value = p.discount || '';
            document.getElementById('p-status').value = p.status || 'none';
            document.getElementById('p-type').value = p.type || '';
            document.getElementById('p-price-tag').value = p.priceTag || '';

            // Handle image inputs reset and fill
            imageInputsContainer.innerHTML = '';
            const images = p.images || [p.image];
            images.forEach((url, idx) => {
                const row = document.createElement('div');
                row.className = 'image-input-row';
                row.style.cssText = 'display: flex; gap: 10px; align-items: start; margin-top: 10px;';
                row.innerHTML = `
                    <div style="flex: 1;">
                        <input type="file" class="p-image-file" accept="image/*" style="width: 100%;">
                        <input type="text" class="p-image-url" placeholder="أدخل رابط الصورة" style="width: 100%; margin-top: 5px;" value="${url || ''}">
                    </div>
                    <button type="button" class="btn-remove-img" style="${idx === 0 ? 'display:none;' : ''} color:#ef4444; font-size:1.5rem; border:none; background:none; cursor:pointer;">&times;</button>
                `;
                imageInputsContainer.appendChild(row);
                bindRowListeners(row);
            });
            updatePreviews();

            // Toggle UI
            document.getElementById('edit-controls').style.display = 'flex';
            document.getElementById('submit-btn').style.display = 'none';
            document.querySelector('.dash-header h1').textContent = 'تعديل المنتج';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.getElementById('cancel-edit-btn').onclick = () => {
            editingProductId = null;
            form.reset();
            imageInputsContainer.innerHTML = `
                <div class="image-input-row" style="display: flex; gap: 10px; align-items: start;">
                    <div style="flex: 1;">
                        <input type="file" class="p-image-file" accept="image/*" style="width: 100%;">
                        <input type="text" class="p-image-url" placeholder="أدخل رابط الصورة" style="width: 100%; margin-top: 5px;">
                    </div>
                    <button type="button" class="btn-remove-img" style="display:none; color:#ef4444; font-size:1.5rem; border:none; background:none;">&times;</button>
                </div>
            `;
            const firstRow = imageInputsContainer.querySelector('.image-input-row');
            bindRowListeners(firstRow);
            updatePreviews();
            document.getElementById('edit-controls').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
            document.querySelector('.dash-header h1').textContent = 'إضافة منتج جديد';

            // Re-bind listeners
            document.querySelector('.p-image-url').oninput = updatePreviews;
            document.querySelector('.p-image-file').onchange = updatePreviews;
        };

        window.deleteProduct = async (id) => {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                try {
                    await deleteDoc(doc(db, "products", id));
                } catch (error) {
                    console.error("Error deleting document: ", error);
                    alert('حدث خطأ أثناء الحذف.');
                }
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = editingProductId ? document.getElementById('update-btn') : document.getElementById('submit-btn');
            btn.disabled = true;

            try {
                const urls = await uploadImages();
                if (urls.length === 0) {
                    alert('يرجى اختيار صورة واحدة على الأقل');
                    btn.disabled = false;
                    uploadStatus.style.display = 'none';
                    return;
                }

                const productData = {
                    name: document.getElementById('p-name').value,
                    category: document.getElementById('p-category').value,
                    brand: document.getElementById('p-brand').value,
                    grade: document.getElementById('p-grade').value,
                    size: document.getElementById('p-size').value,
                    price: document.getElementById('p-price').value,
                    oldPrice: document.getElementById('p-old-price').value,
                    discount: document.getElementById('p-discount').value,
                    status: document.getElementById('p-status').value,
                    type: document.getElementById('p-type').value,
                    priceTag: document.getElementById('p-price-tag').value,
                    images: urls,
                    image: urls[0],
                    updatedAt: new Date()
                };

                if (editingProductId) {
                    await updateDoc(doc(db, "products", editingProductId), productData);
                    alert('تم التحديث بنجاح!');
                    document.getElementById('cancel-edit-btn').click();
                } else {
                    productData.createdAt = new Date();
                    await addDoc(collection(db, "products"), productData);
                    alert('تمت إضافة المنتج بنجاح!');
                    form.reset();
                    document.getElementById('cancel-edit-btn').click(); // Reuse reset logic
                }

            } catch (error) {
                console.error(error);
                alert('حدث خطأ');
                btn.disabled = false;
            }
        };

        loadTags();
        loadProducts();
    </script>
</body>
